<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply2Board — Job Pipeline</title>
  <link rel="stylesheet" href="board.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <svg class="logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <h1>Apply2Board</h1>
      <span class="job-count" id="job-count">0 jobs</span>
    </div>
    <div class="header-right">
      <button class="btn btn-secondary" id="docs-btn">CV & Cover Letters</button>
      <button class="btn btn-primary" id="add-job-btn">+ Add Job</button>
      <button class="btn btn-danger" id="clear-filters" hidden>Clear filters</button>
      <button class="btn btn-secondary" id="export-btn">Export</button>
    </div>
  </header>

  <section class="filters">
    <div class="filter-group">
      <label for="filter-status">Status</label>
      <select id="filter-status">
        <option value="">All statuses</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filter-company">Company</label>
      <select id="filter-company">
        <option value="">All companies</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="filter-salary-min">Salary min</label>
      <input type="number" id="filter-salary-min" placeholder="e.g. 80000" min="0" />
    </div>
    <div class="filter-group">
      <label for="filter-salary-max">Salary max</label>
      <input type="number" id="filter-salary-max" placeholder="e.g. 200000" min="0" />
    </div>
    <div class="filter-group">
      <label for="filter-tag">Tag</label>
      <select id="filter-tag">
        <option value="">All tags</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="board-sort">Sort</label>
      <select id="board-sort"></select>
    </div>
    <div class="filter-group filter-keywords">
      <label for="filter-keywords">Keywords</label>
      <input type="search" id="filter-keywords" placeholder="Search title, company, notes…" />
    </div>
  </section>

  <main class="board" id="board"></main>

  <div class="detail-overlay" id="detail-overlay" hidden>
    <div class="detail-modal" role="dialog">
      <div class="detail-header">
        <h2 id="detail-title"></h2>
        <button class="detail-close" id="detail-close" aria-label="Close">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-actions">
        <button class="btn btn-danger" id="detail-delete">Delete</button>
        <a class="btn btn-secondary" id="detail-link" target="_blank" rel="noopener">Open listing</a>
        <button class="btn btn-primary" id="detail-edit">Edit</button>
      </div>
    </div>
  </div>

  <div class="edit-overlay" id="edit-overlay" hidden>
    <div class="edit-modal" role="dialog">
      <div class="detail-header">
        <h2 id="form-modal-title">Edit Job</h2>
        <button class="detail-close" id="edit-close" aria-label="Close">&times;</button>
      </div>
      <form class="edit-form" id="edit-form">
        <div class="form-field">
          <label for="edit-title">Job Title</label>
          <input type="text" id="edit-title" required />
        </div>
        <div class="form-field">
          <label for="edit-company">Company</label>
          <input type="text" id="edit-company" />
        </div>
        <div class="form-field">
          <label for="edit-link">Link</label>
          <input type="text" id="edit-link" placeholder="https://..." />
        </div>
        <div class="form-field">
          <label for="edit-status">Status</label>
          <select id="edit-status"></select>
        </div>
        <div class="form-field" id="edit-applied-field">
          <label for="edit-applied">Applied date</label>
          <input type="date" id="edit-applied" />
        </div>
        <div class="form-field">
          <label>Salary</label>
          <div class="salary-row">
            <select id="edit-currency"></select>
            <input type="text" id="edit-salary" placeholder="120000 – 150000" />
          </div>
        </div>
        <div class="form-field">
          <label for="edit-tags">Tags <span class="optional">(comma-separated)</span></label>
          <input type="text" id="edit-tags" placeholder="remote, frontend, referral" />
        </div>
        <div class="form-field attach-field">
          <label for="edit-cv-select">CV / Resume</label>
          <select id="edit-cv-select"></select>
          <textarea id="edit-cv-custom-text" rows="3" hidden placeholder="Paste CV text for this job…"></textarea>
          <input type="text" id="edit-cv-custom-link" hidden placeholder="https://drive.google.com/..." />
        </div>
        <div class="form-field attach-field">
          <label for="edit-cl-select">Cover Letter</label>
          <select id="edit-cl-select"></select>
          <textarea id="edit-cl-custom-text" rows="3" hidden placeholder="Paste cover letter text…"></textarea>
          <input type="text" id="edit-cl-custom-link" hidden placeholder="https://docs.google.com/..." />
        </div>
        <div class="form-field">
          <label for="edit-notes">Notes</label>
          <div class="note-templates" id="edit-templates"></div>
          <textarea id="edit-notes" rows="4"></textarea>
        </div>
        <div class="edit-actions">
          <button type="button" class="btn btn-secondary" id="edit-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="form-submit-btn">Save changes</button>
        </div>
      </form>
    </div>
  </div>

  <div class="detail-overlay" id="docs-overlay" hidden>
    <div class="docs-modal" role="dialog">
      <div class="detail-header">
        <h2>CV & Cover Letters</h2>
        <button class="detail-close" id="docs-close" aria-label="Close">&times;</button>
      </div>
      <p class="docs-intro">Save your CVs and cover letters here. When adding a job, pick one from the dropdown.</p>
      <div class="docs-grid">
        <section class="docs-section">
          <div class="docs-section-header">
            <h3>CV / Resume</h3>
            <button type="button" class="btn btn-secondary btn-sm" id="add-doc-cv">+ Add CV</button>
          </div>
          <div class="docs-list" id="docs-list-cv"></div>
        </section>
        <section class="docs-section">
          <div class="docs-section-header">
            <h3>Cover Letters</h3>
            <button type="button" class="btn btn-secondary btn-sm" id="add-doc-cover">+ Add Cover Letter</button>
          </div>
          <div class="docs-list" id="docs-list-cover"></div>
        </section>
      </div>
    </div>
  </div>

  <div class="detail-overlay" id="doc-form-overlay" hidden>
    <div class="edit-modal" role="dialog">
      <div class="detail-header">
        <h2 id="doc-form-title">Add document</h2>
        <button class="detail-close" id="doc-form-close" aria-label="Close">&times;</button>
      </div>
      <form class="edit-form" id="doc-form">
        <input type="hidden" id="doc-type" value="cv" />
        <div class="form-field">
          <label for="doc-name">Name</label>
          <input type="text" id="doc-name" placeholder="e.g. CV Frontend EN" required />
        </div>
        <div class="form-field">
          <label for="doc-content-type">Type</label>
          <select id="doc-content-type">
            <option value="link">Link (Google Drive, Dropbox, etc.)</option>
            <option value="text">Text</option>
          </select>
        </div>
        <div class="form-field" id="doc-content-link-wrap">
          <label for="doc-content-link">Link</label>
          <input type="text" id="doc-content-link" placeholder="https://..." />
        </div>
        <div class="form-field" id="doc-content-text-wrap" hidden>
          <label for="doc-content-text">Text</label>
          <textarea id="doc-content-text" rows="6" placeholder="Paste your CV or cover letter text…"></textarea>
        </div>
        <div class="edit-actions">
          <button type="button" class="btn btn-secondary" id="doc-form-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save document</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../lib/constants.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/attachments.js"></script>
  <script src="board.js"></script>
  <script src="documents.js"></script>
</body>
</html>
